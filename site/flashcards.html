<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards — MKT 3717 - New Product Development &amp; Brand Management</title>
  <link rel="stylesheet" href="css/theme.css">
  <style>
    .flashcard-wrapper { max-width: 800px; margin: 0 auto; padding: var(--padding-page); min-height: 60vh; }
    .flashcard-wrapper h1 { color: var(--white); margin-bottom: var(--spacing); }
    .flashcard-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; color: var(--text-mute); font-size: 1rem; }
    .flashcard-loading .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: var(--spacing); }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main class="flashcard-wrapper" role="main">
    <header role="banner">
      <h1>Flashcards</h1>
      <p class="subtitle" style="color: var(--text-mute); font-size: 1rem;">Interactive flashcards to test your recall on key terms and concepts</p>
    </header>
    <div id="flashcard-app" data-src="data/flashcards.json" aria-label="Flashcard application" role="application">
      <div class="flashcard-loading" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <p>Loading flashcards&hellip;</p>
      </div>
    </div>
  </main>
  <script src="js/nav.js" defer></script>
  <script src="js/flashcards.js" defer></script>
</body>
</html>
