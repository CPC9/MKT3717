<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Exam 1 &mdash; MKT 3717</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="exam-styles.css">
</head>
<body>
  <div class="exam-page">
    <header class="exam-header">
      <h1 class="exam-title">Practice Exam 1</h1>
      <p class="exam-description">Comprehensive practice exam covering all course material: NPD process, opportunity identification, concept screening, conjoint analysis, project management, and brand management.</p>
      <div class="exam-meta">
        <span class="exam-meta-item" id="exam-question-count"></span>
        <span class="exam-meta-item" id="exam-progress"></span>
      </div>
    </header>

    <main id="exam-container" data-exam="../data/exam-1.json"></main>

    <footer class="exam-footer">
      <button type="button" class="btn btn-check" id="btn-check-answers" disabled>
        Show Correct Answers
      </button>
      <div id="score-summary" class="score-summary" hidden></div>
    </footer>
  </div>

  <script src="../js/nav.js"></script>
  <script src="exam-checker.js"></script>
</body>
</html>
