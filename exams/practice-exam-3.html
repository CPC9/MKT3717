<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Exam 3</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="exam-styles.css">
</head>
<body>
  <div class="exam-page">
    <header class="exam-header">
      <h1 class="exam-title">Practice Exam 3</h1>
      <p class="exam-description">Practice exam emphasizing concept screening methods and market experiments. Deep focus on Pugh Matrix, Concept Scoring Matrix, JTBD, Critical Path Method, A/B testing, and experimental design.</p>
      <div class="exam-meta">
        <span class="exam-meta-item" id="exam-question-count"></span>
        <span class="exam-meta-item" id="exam-progress"></span>
      </div>
    </header>

    <main id="exam-container" data-exam="../data/exam-3.json"></main>

    <footer class="exam-footer">
      <button type="button" class="btn btn-check" id="btn-check-answers" disabled>
        Show Correct Answers
      </button>
      <button type="button" class="btn btn-reset" id="btn-reset-exam" style="display:none">
        Reset Exam
      </button>
      <div id="score-summary" class="score-summary" hidden></div>
    </footer>
  </div>

  <script src="../js/nav.js"></script>
  <script src="exam-checker.js"></script>
</body>
</html>
